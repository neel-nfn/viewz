name: ci

on:
  push:
    branches: [dev, main, "feature/**"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Lint backend
        run: python -m compileall backend/app
      - name: Frontend install
        run: |
          cd frontend
          npm i
          npm run build
