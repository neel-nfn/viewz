services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: viewz
      POSTGRES_PASSWORD: viewz
      POSTGRES_DB: viewz
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viewz -d viewz"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ../backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    working_dir: /app
    image: node:20-alpine
    command: sh -c "npm i && npm run dev"
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
